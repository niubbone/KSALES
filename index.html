<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KSales</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800" x-data="app()" x-init="init()" x-cloak>

  <!-- Navbar -->
  <nav class="bg-[#1c3557] text-white px-6 py-3 flex items-center gap-6 shadow">
    <span class="font-bold text-lg tracking-wide">KSales</span>
    <button @click="sezione='contratti'" :class="sezione==='contratti' ? 'underline' : 'opacity-70 hover:opacity-100'" class="text-sm">Contratti</button>
    <button @click="sezione='clienti'"   :class="sezione==='clienti'   ? 'underline' : 'opacity-70 hover:opacity-100'" class="text-sm">Clienti</button>
  </nav>

  <!-- Loader -->
  <div x-show="loading" class="flex items-center justify-center h-48 text-gray-400">
    <svg class="animate-spin h-8 w-8 mr-3" viewBox="0 0 24 24" fill="none">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
    </svg>
    Caricamento…
  </div>

  <!-- Errore -->
  <div x-show="errore" class="m-6 p-4 bg-red-50 border border-red-300 rounded text-red-700 text-sm" x-text="errore"></div>

  <!-- Contratti -->
  <section x-show="!loading && sezione==='contratti'" class="p-6">
    <div class="flex items-center gap-4 mb-4">
      <h1 class="text-xl font-semibold">Contratti</h1>
      <input x-model="filtroContratti" type="search" placeholder="Cerca cliente, ordine, agenzia…"
             class="ml-auto border rounded px-3 py-1.5 text-sm w-72 focus:outline-none focus:ring-2 focus:ring-[#1c3557]">
    </div>
    <div class="overflow-x-auto rounded shadow-sm">
      <table class="min-w-full text-sm bg-white">
        <thead>
          <tr class="bg-[#1c3557] text-white">
            <template x-for="h in ['Ordine','Contratto','Cliente','Agenzia','Data Firma','Durata','Tipo','Stato']">
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap" x-text="h"></th>
            </template>
          </tr>
        </thead>
        <tbody>
          <template x-for="(c, i) in contrattiFiltrati" :key="i">
            <tr :class="i%2===0 ? 'bg-white' : 'bg-gray-50'" class="border-b border-gray-100 hover:bg-blue-50">
              <td class="px-3 py-2 whitespace-nowrap font-mono text-xs" x-text="c.num_ordine_wki"></td>
              <td class="px-3 py-2 whitespace-nowrap font-mono text-xs" x-text="c.num_contratto"></td>
              <td class="px-3 py-2" x-text="c.ragione_sociale"></td>
              <td class="px-3 py-2 whitespace-nowrap" x-text="c.codice_agenzia"></td>
              <td class="px-3 py-2 whitespace-nowrap text-xs" x-text="fmtData(c.data_firma)"></td>
              <td class="px-3 py-2 text-center" x-text="c.durata_mesi ? c.durata_mesi+'m' : ''"></td>
              <td class="px-3 py-2">
                <span :class="c.tipo==='NUOVO' ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700'"
                      class="px-2 py-0.5 rounded text-xs font-medium" x-text="c.tipo"></span>
              </td>
              <td class="px-3 py-2">
                <span :class="c.stato==='DISDETTO' ? 'bg-gray-200 text-gray-500' : 'bg-green-100 text-green-700'"
                      class="px-2 py-0.5 rounded text-xs font-medium" x-text="c.stato||'ATTIVO'"></span>
              </td>
            </tr>
          </template>
          <tr x-show="contrattiFiltrati.length===0 && !loading">
            <td colspan="8" class="px-3 py-6 text-center text-gray-400">Nessun contratto trovato</td>
          </tr>
        </tbody>
      </table>
    </div>
    <p class="text-xs text-gray-400 mt-2" x-text="contrattiFiltrati.length + ' / ' + contratti.length + ' contratti'"></p>
  </section>

  <!-- Clienti -->
  <section x-show="!loading && sezione==='clienti'" class="p-6">
    <div class="flex items-center gap-4 mb-4">
      <h1 class="text-xl font-semibold">Clienti</h1>
      <input x-model="filtroClienti" type="search" placeholder="Cerca cliente, città, provincia…"
             class="ml-auto border rounded px-3 py-1.5 text-sm w-72 focus:outline-none focus:ring-2 focus:ring-[#1c3557]">
    </div>
    <div class="overflow-x-auto rounded shadow-sm">
      <table class="min-w-full text-sm bg-white">
        <thead>
          <tr class="bg-[#1c3557] text-white">
            <template x-for="h in ['Codice','Ragione Sociale','CAP','Città','Provincia','Agenzia']">
              <th class="px-3 py-2 text-left font-medium whitespace-nowrap" x-text="h"></th>
            </template>
          </tr>
        </thead>
        <tbody>
          <template x-for="(c, i) in clientiFiltrati" :key="i">
            <tr :class="i%2===0 ? 'bg-white' : 'bg-gray-50'" class="border-b border-gray-100 hover:bg-blue-50">
              <td class="px-3 py-2 font-mono text-xs" x-text="c.codice_cliente"></td>
              <td class="px-3 py-2" x-text="c.ragione_sociale"></td>
              <td class="px-3 py-2 text-xs" x-text="c.cap"></td>
              <td class="px-3 py-2" x-text="c.citta"></td>
              <td class="px-3 py-2 text-center" x-text="c.provincia"></td>
              <td class="px-3 py-2 whitespace-nowrap" x-text="c.codice_agenzia"></td>
            </tr>
          </template>
          <tr x-show="clientiFiltrati.length===0 && !loading">
            <td colspan="6" class="px-3 py-6 text-center text-gray-400">Nessun cliente trovato</td>
          </tr>
        </tbody>
      </table>
    </div>
    <p class="text-xs text-gray-400 mt-2" x-text="clientiFiltrati.length + ' / ' + clienti.length + ' clienti'"></p>
  </section>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    function app() {
      return {
        sezione: 'contratti',
        loading: true,
        errore: '',
        contratti: [],
        clienti: [],
        filtroContratti: '',
        filtroClienti: '',

        init() {
          Promise.all([
            API.getContratti(),
            API.getClienti()
          ]).then(([contratti, clienti]) => {
            this.contratti = contratti;
            this.clienti   = clienti;
            this.loading   = false;
          }).catch(err => {
            this.errore  = 'Errore caricamento dati: ' + err;
            this.loading = false;
          });
        },

        get contrattiFiltrati() {
          var q = this.filtroContratti.toLowerCase();
          if (!q) return this.contratti;
          return this.contratti.filter(c =>
            (c.ragione_sociale || '').toLowerCase().includes(q) ||
            (c.num_ordine_wki  || '').toLowerCase().includes(q) ||
            (c.codice_agenzia  || '').toLowerCase().includes(q) ||
            (c.num_contratto   || '').toLowerCase().includes(q)
          );
        },

        get clientiFiltrati() {
          var q = this.filtroClienti.toLowerCase();
          if (!q) return this.clienti;
          return this.clienti.filter(c =>
            (c.ragione_sociale || '').toLowerCase().includes(q) ||
            (c.citta           || '').toLowerCase().includes(q) ||
            (c.provincia       || '').toLowerCase().includes(q)
          );
        },

        fmtData(v) {
          if (!v) return '';
          if (typeof v === 'string') return v;
          if (v instanceof Date || (typeof v === 'object' && v.getTime)) {
            return ('0'+v.getDate()).slice(-2)+'/'+('0'+(v.getMonth()+1)).slice(-2)+'/'+v.getFullYear();
          }
          return v;
        }
      };
    }
  </script>
</body>
</html>
